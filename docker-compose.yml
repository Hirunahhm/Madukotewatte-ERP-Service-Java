services:
  db:
    image: postgres:16-alpine
    container_name: estate_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-estate_erp}
      POSTGRES_USER: ${DB_USER:-estate_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estate_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # expose for local dev/tools (pgAdmin etc.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-estate_user} -d ${DB_NAME:-estate_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estate_erp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-estate_erp}
      DB_USER: ${DB_USER:-estate_user}
      DB_PASSWORD: ${DB_PASSWORD:-estate_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"      # expose app directly for dev; nginx proxies in prod

  nginx:
    image: nginx:alpine
    container_name: estate_erp_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # place SSL certs here when ready

volumes:
  postgres_data:
