events {
    worker_connections 1024;
}

http {
    upstream spring_app {
        server app:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;   # allow image uploads for Crop Doctor later

        # API proxy
        location /api/ {
            proxy_pass         http://spring_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://spring_app;
            proxy_set_header Host $host;
        }

        # OpenAPI docs
        location /api-docs {
            proxy_pass http://spring_app;
            proxy_set_header Host $host;
        }

        location / {
            return 404;
        }
    }
}
